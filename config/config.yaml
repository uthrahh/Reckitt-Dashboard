# =============================================================================
# Pipeline Configuration
# All environment-specific and tunable values live here — never hardcode
# paths or thresholds inside pipeline logic.
# =============================================================================

app:
  name: "reckitt_fmcg_sales_pipeline"
  environment: "local"          # local | dev | prod

paths:
  raw_data: "data/raw/reckitt_sales.csv"
  staging_dir: "data/staging"
  curated_dir: "data/curated"
  logs_dir: "logs"

spark:
  app_name: "ReckittFMCGSalesETL"
  shuffle_partitions: 8          # tuned low for local mode / small dataset
  master: "local[*]"

data_quality:
  max_allowed_null_pct: 5.0      # fail pipeline if any column exceeds this
  # NOTE: deduplication uses full-row matching (see cleaning.deduplicate_rows),
  # not a business-key subset — the profiling step confirmed source
  # duplicates are exact re-ingestion artifacts, not legitimate repeats.
  # No config entry needed here; documented for anyone tempted to add one.

cleaning:
  warehouse_id_fill_value: "UNKNOWN"
  numeric_string_columns:        # columns stored as comma-formatted strings
    - "Value Sales"
    - "Units Sales"
